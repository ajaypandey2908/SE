<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<div class="vh-100 d-flex justify-content-center align-items-center position-relative"
    style="background-image: url('https://zerolite.in/assets/img/skills-img.jpg'); background-size: cover; background-position: center;">

    <div class="position-absolute top-0 start-0 w-100 h-100" style="background-color: rgba(0, 0, 0, 0.5);"></div>

    <!-- <p>
        Welcome to Zerolite Solutions
        We at Zerolite solutions believe in CIS- Commitment, Integrity & Satisfaction. We archive our all business
        commitments of our customers with all the business ethics with maximus customer satisfaction.
    </p> -->
    <a routerLink="/" style="cursor: pointer;">
        <img src="https://zerolite.in/assets/img/logo/zerolite-logo.png" class="position-absolute top-0 start-0 m-3"
            style="width: 120px;">
    </a>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 mx-auto">

                <!-- <div class="bg-dark bg-opacity-50 p-4 rounded"> -->
                <div class="card shadow-lg">

                    <div class="card-header bg-secondary text-white d-flex align-items-center gap-2">
                        <img src="https://zerolite.in/assets/img/logo/zerolite-logo.png" style="width: 60px;">
                        <h3 class="mb-0">
                            User Login <i class="fa-solid fa-user text-warning"></i>
                        </h3>
                    </div>

                    <div class="card-body">

                        <form [formGroup]="loginPageForm" (ngSubmit)="onLogin()">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">
                                    VIPL Code <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control form-control-sm" formControlName="viplcode"
                                    placeholder="Enter VIPL code" [ngClass]="{
                                            'is-valid': loginPageForm.get('viplcode')?.valid && loginPageForm.get('viplcode')?.touched,
                                            'is-invalid': loginPageForm.get('viplcode')?.invalid && loginPageForm.get('viplcode')?.touched
                                        }">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Username <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm" formControlName="username"
                                    placeholder="Enter your name" [ngClass]="{
                                            'is-valid': loginPageForm.get('username')?.valid && loginPageForm.get('username')?.touched,
                                            'is-invalid': loginPageForm.get('username')?.invalid && loginPageForm.get('username')?.touched
                                        }">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">
                                    Password <span class="text-danger">*</span>
                                </label>
                                <input type="password" class="form-control form-control-sm" formControlName="password"
                                    placeholder="Enter password" [ngClass]="{
                                            'is-valid': loginPageForm.get('password')?.valid && loginPageForm.get('password')?.touched,
                                            'is-invalid': loginPageForm.get('password')?.invalid && loginPageForm.get('password')?.touched
                                        }">
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-secondary fw-bold px-4">
                                    Login <i class="fa-solid fa-right-to-bracket text-warning"></i>
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
        
    </div>
</div>

<footer class="bg-secondary text-white pb-2 mt-auto">
    <div class="container text-center text-md-start">

            <div class="col-md-4">
                <img class="mt-2" src="https://zerolite.in/assets/img/logo/zerolite-logo.png" style="width: 120px;">
            </div>

            <hr>

            <div class="text-center small">
            © 2026 Zerolite. All Rights Reserved.
            </div>

    </div>
            
</footer>
